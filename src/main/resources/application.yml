spring:
  application:
    name: spring-data-redis-cache-mysql
  # ── MySQL ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/PRODUCTDB?createDatabaseIfNotExist=true
    username: root
    password: root123#
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        #format_sql: true
  # ── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      cache:
        ttl: 10                        # TTL in minutes

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics